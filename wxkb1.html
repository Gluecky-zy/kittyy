<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>广东——佛山公司市场看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --primary: #0A7BA8;
  --primary-light: #E3F4F8;
  --primary-dark: #05607A;
  --secondary: #C45A10;
  --tertiary: #595959;
  --green: #2E7D32;
  --orange: #E65100;
  --purple: #6A1B9A;
  --red: #C62828;
  --bg: #F5F7FA;
  --card-bg: #ffffff;
  --text: #263238;
  --text-muted: #607D8B;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; }

/* 顶栏 - 浅蓝色模板风格 */
.header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(10,123,168,.25); }
.header-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 2px; }
.header-sub { font-size: 11px; color: rgba(255,255,255,.8); margin-top: 2px; }
.time-display { color: rgba(255,255,255,.9); font-size: 13px; }

/* 切片器 */
.slicer-bar { background: #fff; border-bottom: 1px solid rgba(10,123,168,.1); padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(10,123,168,.05); }
.slicer-label { color: var(--text-muted); font-size: 13px; font-weight: 500; }
.slicer-btn { padding: 5px 16px; border: 1px solid rgba(10,123,168,.3); background: transparent; color: var(--primary); border-radius: 20px; cursor: pointer; font-size: 13px; transition: all .2s; font-weight: 500; }
.slicer-btn:hover { background: var(--primary-light); }
.slicer-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(10,123,168,.25); }

/* 主体 */
.main { padding: 16px 24px; }

/* KPI卡片 */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card { background: #fff; border: 1px solid rgba(10,123,168,.08); border-radius: 10px; padding: 16px 14px; position: relative; overflow: hidden; box-shadow: 0 1px 6px rgba(10,123,168,.06); transition: transform .2s, box-shadow .2s; }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10,123,168,.12); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 10px 10px 0 0; }
.kpi-card.blue::before { background: linear-gradient(90deg, var(--primary), #1E88E5); }
.kpi-card.orange::before { background: linear-gradient(90deg, var(--secondary), #FF8F00); }
.kpi-card.purple::before { background: linear-gradient(90deg, var(--purple), #AB47BC); }
.kpi-card.red::before { background: linear-gradient(90deg, var(--red), #EF5350); }

.kpi-title { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; padding-top: 2px; letter-spacing: .3px; line-height: 1.5; font-weight: 500; }
.kpi-dual { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 8px; }
.kpi-num-item { display: flex; flex-direction: column; align-items: flex-start; }
.kpi-num-label { font-size: 10px; color: #90A4AE; margin-bottom: 2px; }
.kpi-num-value { font-size: 22px; font-weight: 700; line-height: 1; }
.kpi-num-value.blue { color: var(--primary); }
.kpi-num-value.orange { color: var(--secondary); }
.kpi-num-value.purple { color: var(--purple); }
.kpi-num-value.red { color: var(--red); }
.kpi-num-unit { font-size: 12px; font-weight: 400; margin-left: 1px; }
.kpi-rate-line { font-size: 11px; color: var(--red); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.kpi-rate-line.good { color: var(--green); }
.kpi-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; margin-left: 6px; }
.kpi-tag.warn { background: rgba(230,81,0,.1); color: #E65100; }
.kpi-tag.bad { background: rgba(198,40,40,.1); color: #C62828; }
.kpi-tag.good { background: rgba(46,125,50,.1); color: #2E7D32; }
.kpi-divider { width: 1px; background: rgba(10,123,168,.25); align-self: stretch; margin: 0 8px; }
.kpi-left, .kpi-right { min-width: 0; }
.kpi-left { text-align: left; }
.kpi-right { text-align: left; }

/* 图表行 */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.chart-card { background: #fff; border: 1px solid rgba(10,123,168,.08); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(10,123,168,.06); }
.chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.chart-title::before { content: ''; width: 3px; height: 14px; background: linear-gradient(180deg, var(--primary), #4FC3F7); border-radius: 2px; }
.chart-summary { display: none; }

/* 环形进度 - 优化文字居中 */
.ring-row { display: flex; justify-content: space-evenly; align-items: flex-start; flex-wrap: nowrap; gap: 0; padding: 15px 40px; width: 100%; box-sizing: border-box; }
.ring-item { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-width: 0; max-width: 200px; }
.ring-wrap { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
.ring-wrap canvas { position: absolute; top: 0; left: 0; }
.ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-text { display: none; }
.ring-pct { font-size: 20px; font-weight: 700; line-height: 1.2; }
.ring-name { font-size: 11px; margin-top: 4px; font-weight: 600; line-height: 1.2; white-space: nowrap; }
.ring-info { font-size: 11px; color: var(--text-muted); margin-top: 12px; line-height: 1.5; white-space: nowrap; text-align: center; }

/* 分页样式 */
.pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--primary-light); flex-wrap: wrap; }
.page-btn { padding: 4px 10px; background: #fff; border: 1px solid rgba(10,123,168,.3); color: var(--primary); border-radius: 4px; cursor: pointer; font-size: 12px; transition: all .2s; min-width: 32px; }
.page-btn:hover { background: rgba(10,123,168,.1); }
.page-btn:disabled { background: #ECEFF1; color: #B0BEC5; border-color: #ECEFF1; cursor: not-allowed; }
.page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.page-info { font-size: 12px; color: var(--text-muted); margin: 0 8px; }
.page-jump { display: flex; align-items: center; gap: 4px; }
.page-input { width: 40px; padding: 3px 6px; border: 1px solid rgba(10,123,168,.3); border-radius: 4px; text-align: center; font-size: 12px; }
.page-input:focus { outline: none; border-color: var(--primary); }

/* 明细表 */
.section-card { background: #fff; border: 1px solid rgba(10,123,168,.08); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(10,123,168,.06); margin-bottom: 16px; }
.tab-bar { display: flex; border-bottom: 2px solid var(--primary-light); margin-bottom: 12px; }
.tab-btn { padding: 7px 20px; background: transparent; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; font-weight: 500; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-bar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; font-weight: 500; }
.filter-input { background: #ECEFF1; border: 1px solid rgba(10,123,168,.15); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; min-width: 160px; transition: border-color .2s; }
.filter-input:focus { outline: none; border-color: var(--primary); background: #fff; }
.filter-select { background: #ECEFF1; border: 1px solid rgba(10,123,168,.15); color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: border-color .2s; }
.filter-select:focus { outline: none; border-color: var(--primary); background: #fff; }
.table-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: var(--primary-light); color: var(--primary); padding: 8px 10px; text-align: left; font-weight: 600; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid rgba(10,123,168,.15); white-space: nowrap; cursor: pointer; user-select: none; transition: background .2s; }
.data-table th:hover { background: #B2EBF2; }
.data-table th .sort-icon { margin-left: 4px; font-size: 10px; opacity: 0.4; color: var(--primary); }
.data-table th.sorted .sort-icon { opacity: 1; }
.data-table td { padding: 7px 10px; border-bottom: 1px solid #ECEFF1; color: var(--text); white-space: nowrap; }
.data-table tr:hover td { background: #F5F5F5; }
.data-table tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-3 { background: rgba(10,123,168,.1); color: var(--primary); }
.badge-2 { background: rgba(46,125,50,.1); color: var(--green); }
.badge-1 { background: rgba(230,81,0,.1); color: var(--orange); }
.badge-0 { background: rgba(96,125,139,.1); color: var(--text-muted); }
.rate-bar { display: inline-flex; align-items: center; gap: 5px; }
.rate-track { width: 55px; height: 5px; background: rgba(10,123,168,.1); border-radius: 3px; overflow: hidden; display: inline-block; }
.rate-fill { height: 100%; border-radius: 3px; }
.link-btn { color: var(--primary); cursor: pointer; text-decoration: none; background: none; border: none; font-size: 12px; padding: 0; font-weight: 500; }
.link-btn:hover { color: var(--primary-dark); text-decoration: underline; }

/* 弹窗 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 20px; width: 92%; max-width: 900px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(10,123,168,.2); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #ECEFF1; }
.modal-title { font-size: 14px; font-weight: 700; color: var(--primary); }
.modal-close { cursor: pointer; font-size: 22px; color: var(--text-muted); background: none; border: none; line-height: 1; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.modal-close:hover { background: #ECEFF1; }
.modal-body { overflow-y: auto; flex: 1; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #F5F5F5; }
::-webkit-scrollbar-thumb { background: rgba(10,123,168,.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(10,123,168,.4); }

/* 响应式 */
/* 平板适配 */
@media (max-width: 1024px) {
  .main { padding: 12px 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .kpi-num-value { font-size: 18px; }
  .chart-card { width: 100%; }
}

/* 手机端适配 */
@media (max-width: 768px) {
  .header { padding: 10px 14px; }
  .header-title { font-size: 15px; letter-spacing: 1px; }
  .slicer-bar { padding: 8px 14px; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .slicer-btn { padding: 4px 10px; font-size: 11px; flex-shrink: 0; }
  .slicer-label { flex-shrink: 0; }
  .main { padding: 10px 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kpi-card { padding: 10px 8px; }
  .kpi-num-value { font-size: 16px; }
  .kpi-title { font-size: 10px; }
  .kpi-dual { gap: 10px; }
  .chart-row { grid-template-columns: 1fr; gap: 10px; }
  .chart-card { width: 100%; padding: 12px; }
  #levelChart { width: 100% !important; height: 200px; }
  .ring-wrap { width: 90px; height: 90px; }
  .ring-pct { font-size: 17px; }
  .table-wrap { max-height: 320px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .data-table { font-size: 11px; min-width: 600px; white-space: nowrap; }
  .data-table th, .data-table td { padding: 5px 6px; white-space: nowrap; }
  .modal { width: 97%; padding: 12px; }
  .filter-input { min-width: 130px; flex: 1; }
  .filter-bar { flex-wrap: wrap; }
}

/* 小屏手机 */
@media (max-width: 480px) {
  .header { padding: 8px 12px; }
  .header-title { font-size: 14px; }
  .header-sub { display: none; }
  .main { padding: 8px 10px; }
  /* KPI卡片垂直堆叠 */
  .kpi-grid { grid-template-columns: 1fr !important; gap: 8px; }
  .kpi-card { width: 100% !important; }
  .kpi-dual { justify-content: space-between; }
  .kpi-num-value { font-size: 18px; }
  .kpi-title { font-size: 11px; }
  /* 图表全宽 */
  .chart-row { gap: 8px; }
  .chart-card { padding: 10px; }
  #levelChart { height: 180px; }
  /* 环形图调整 - 手机端强制三列均匀分布 */
  .ring-row { gap: 6px !important; padding: 6px 4px !important; justify-content: space-between !important; }
  .ring-item { flex: 1 !important; min-width: 0 !important; max-width: none !important; padding: 0 2px !important; }
  .ring-wrap { width: 80px !important; height: 80px !important; flex-shrink: 0; }
  .ring-center { width: 70px !important; max-width: 70px !important; }
  .ring-pct { font-size: 16px !important; }
  .ring-name { font-size: 10px !important; }
  .ring-info { font-size: 9px !important; line-height: 1.3 !important; margin-top: 4px !important; white-space: normal !important; max-width: 90px; }
  /* 表格横向滚动 */
  .table-wrap { max-height: 300px; -webkit-overflow-scrolling: touch; overflow-x: auto; }
  .data-table { font-size: 10px; min-width: 520px; }
  .data-table th, .data-table td { padding: 4px 5px; }
  .filter-input { min-width: 100px; font-size: 11px; padding: 4px 8px; }
  .filter-select { font-size: 11px; padding: 4px 8px; }
  .modal { width: 98%; padding: 10px; }
  .modal-title { font-size: 13px; }
}

/* 超小屏 */
@media (max-width: 360px) {
  .header-title { font-size: 13px; }
  .slicer-btn { padding: 3px 8px; font-size: 10px; }
  .kpi-num-value { font-size: 16px; }
  .ring-wrap { width: 70px; height: 70px; }
  .ring-pct { font-size: 14px; }
  .data-table { min-width: 480px; font-size: 9px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">广东——佛山公司市场看板</div>
    <div class="header-sub">数据来源：佛山市场数据梳理 | 实时统计</div>
  </div>
  <div class="time-display" id="timeDisplay">2026/04/23</div>
</div>

<div class="slicer-bar">
  <span class="slicer-label">区域筛选：</span>
  <button class="slicer-btn active" onclick="switchArea('总体',this)">总体概览</button>
  <button class="slicer-btn" onclick="switchArea('顺德区',this)">顺德区</button>
  <button class="slicer-btn" onclick="switchArea('南海区',this)">南海区</button>
  <button class="slicer-btn" onclick="switchArea('禅城区',this)">禅城区</button>
  <button class="slicer-btn" onclick="switchArea('三水区',this)">三水区</button>
  <button class="slicer-btn" onclick="switchArea('高明区',this)">高明区</button>
</div>

<div class="main">
  <!-- KPI卡片 -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- 图表行 -->
  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-title">终端覆盖情况</div>
      <div class="chart-summary" id="levelChartSummary"></div>
      <div id="levelChart" style="height: 200px;"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">销售类型完成进度</div>
      <div class="ring-row" id="ringRow"></div>
    </div>
  </div>

  <!-- 明细表 -->
  <div class="section-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('terminal',this)">终端销售情况</button>
      <button class="tab-btn" onclick="switchTab('product',this)">产品销售明细</button>
    </div>
    <div class="tab-content active" id="tab-terminal">
      <div class="filter-bar">
        <label>筛选医院：</label>
        <input class="filter-input" id="filterHospital" placeholder="输入医院名称筛选..." oninput="renderTerminalTable()">
        <label>筛选产品：</label>
        <input class="filter-input" id="filterProduct" placeholder="输入产品名称筛选..." oninput="renderTerminalTable()">
        <label>医院等级：</label>
        <select class="filter-select" id="filterLevel" onchange="renderTerminalTable()">
          <option value="">全部</option>
          <option value="三级">三级</option>
          <option value="二级">二级</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="terminalTable">
          <thead><tr>
            <th>序号</th>
            <th data-sort="terminalName">终端名称<span class="sort-icon">⇅</span></th>
            <th data-sort="terminalLevel">终端等级<span class="sort-icon">⇅</span></th>
            <th data-sort="salesAmount">药品销售金额(万)<span class="sort-icon">⇅</span></th>
            <th>城市经理</th>
            <th data-sort="productCount">在销产品数<span class="sort-icon">⇅</span></th>
            <th data-sort="targetAmount">目标金额(万)<span class="sort-icon">⇅</span></th>
            <th data-sort="completeAmount">完成金额(万)<span class="sort-icon">⇅</span></th>
            <th>完成率</th>
            <th>费用率</th>
          </tr></thead>
          <tbody id="terminalTbody"></tbody>
        </table>
        <div class="pagination" id="terminalPagination"></div>
      </div>
    </div>
    <div class="tab-content" id="tab-product">
      <div class="filter-bar">
        <label>筛选产品：</label>
        <input class="filter-input" id="filterProductName" placeholder="输入产品名称筛选..." oninput="renderProductTable()">
      </div>
      <div class="table-wrap">
        <table class="data-table" id="productTable">
          <thead><tr>
            <th>序号</th>
            <th>产品名称</th>
            <th>产品分类</th>
            <th data-sort="terminalCount">在销终端数<span class="sort-icon">⇅</span></th>
            <th data-sort="targetAmount">目标金额(万)<span class="sort-icon">⇅</span></th>
            <th data-sort="completeAmount">完成金额(万)<span class="sort-icon">⇅</span></th>
            <th>完成率</th>
            <th>费用率</th>
          </tr></thead>
          <tbody id="productTbody"></tbody>
        </table>
        <div class="pagination" id="productPagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">明细</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

function renderLevelChart(d) {
  if(!levelChart) levelChart=echarts.init(document.getElementById('levelChart'));
  var lv=['三级','二级','其他'];
  var tot=lv.map(function(l){return d.level_stats[l]?d.level_stats[l].total:0});
  var act=lv.map(function(l){return d.level_stats[l]?d.level_stats[l].active:0});
  
  // 计算各等级覆盖率
  var lvRates=lv.map(function(l,i){return tot[i]>0?((act[i]/tot[i])*100).toFixed(1):'0.0'});
  
  // 清空顶部数据条
  document.getElementById('levelChartSummary').innerHTML='';
  
  // 横坐标带覆盖率
  var xAxisData=lv.map(function(l,i){return l+'('+lvRates[i]+'%)'});
  
  levelChart.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:function(params){
      var idx=params[0].dataIndex;
      return lv[idx]+'<br/>规模终端: '+tot[idx]+' 家<br/>在销终端: '+act[idx]+' 家<br/>覆盖率: '+lvRates[idx]+'%';
    }},
    legend:{data:['市场规模终端数','在销终端数'],bottom:0,textStyle:{fontSize:11}},
    grid:{left:'3%',right:'4%',bottom:'18%',top:'25px',containLabel:true},
    xAxis:{type:'category',data:xAxisData,name:'',nameLocation:'middle',nameGap:30,nameTextStyle:{fontSize:11,color:'#607D8B'},axisLabel:{interval:0,rotate:0,margin:10}},
    yAxis:{type:'value',name:'',nameTextStyle:{fontSize:11}},
    series:[
      {name:'市场规模终端数',type:'bar',data:tot,itemStyle:{color:'rgba(10,123,168,0.2)'},label:{show:true,position:'top',fontSize:12,fontWeight:'bold',color:'#0A7BA8',distance:5}},
      {name:'在销终端数',type:'bar',data:act,itemStyle:{color:'#0A7BA8'},label:{show:true,position:'top',fontSize:12,fontWeight:'bold',color:'#0A7BA8',distance:5}}
    ]
  });
}

function drawRing(id, pct, color) {
  var c=document.getElementById(id);if(!c)return;
  var ctx=c.getContext('2d');var w=c.width,h=c.height;var cx=w/2,cy=h/2,r=Math.min(w,h)/2-20;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=8;ctx.stroke();
  var ea=(pct*360-90)*Math.PI/180;
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,ea);ctx.strokeStyle=color;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
}

function renderRings(d) {
  var cats=[{name:'品牌品',color:'#0A7BA8'},{name:'商销品',color:'#2E7D32'},{name:'高值品',color:'#C45A10'}];
  var html='';
  cats.forEach(function(c){
    var s=d.category_stats[c.name];if(!s)return;
    var pct=(s.rate*100).toFixed(1);
    html+='<div class="ring-item"><div class="ring-wrap"><canvas id="ring_'+c.name+'" width="120" height="120"></canvas><div class="ring-center"><div class="ring-pct" style="color:'+c.color+';">'+pct+'%</div><div class="ring-name" style="color:'+c.color+';">'+c.name+'</div></div></div><div class="ring-info">目标 '+fmtNum(s.target/10000)+'万 / 完成 '+fmtNum(s.complete/10000)+'万</div></div>';
  });
  document.getElementById('ringRow').innerHTML=html;
  setTimeout(function(){cats.forEach(function(c){var s=d.category_stats[c.name];if(s)drawRing('ring_'+c.name,s.rate,c.color)})},100);
}

function getAreaCode(a){var m={'总体':null,'顺德区':'佛山市-顺德区','南海区':'佛山市-南海区','禅城区':'佛山市-禅城区','三水区':'佛山市-三水区','高明区':'佛山市-高明区'};return m[a]||null;}

function sortTerminalData(data){
  if(!terminalSortField)return data;
  return data.slice().sort(function(a,b){
    var va,vb;
    switch(terminalSortField){
      case'terminalName':va=a['\u7ec8\u7aef\u540d\u79f0'];vb=b['\u7ec8\u7aef\u540d\u79f0'];break;
      case'terminalLevel':va=a['\u7ec8\u7aef\u7b49\u7ea7'];vb=b['\u7ec8\u7aef\u7b49\u7ea7'];break;
      case'salesAmount':case'completeAmount':va=a['\u5b8c\u6210\u91d1\u989d'];vb=b['\u5b8c\u6210\u91d1\u989d'];break;
      case'productCount':va=a['\u5728\u9500\u4ea7\u54c1\u6570'];vb=b['\u5728\u9500\u4ea7\u54c1\u6570'];break;
      case'targetAmount':va=a['\u76ee\u6807\u91d1\u989d'];vb=b['\u76ee\u6807\u91d1\u989d'];break;
      default:return 0;
    }
    if(typeof va==='string')return terminalSortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return terminalSortAsc?va-vb:vb-va;
  });
}

function renderTerminalTable(){

  var allData=detailData.terminal_summary.filter(function(r){
    if(r['\u533a\u53bf']&&ac&&r['\u533a\u53bf']!==ac)return false;
    if(h&&r['\u7ec8\u7aef\u540d\u79f0'].toLowerCase().indexOf(h)===-1)return false;
    if(p){var hp=detailData.terminal_detail.some(function(d){return d['\u7ec8\u7aef\u540d\u79f0']===r['\u7ec8\u7aef\u540d\u79f0']&&d['\u4ea7\u54c1\u540d\u79f0'].toLowerCase().indexOf(p)>-1});if(!hp)return false}
    if(l){if(l==='\u5176\u4ed6'){if(r['\u7ec8\u7aef\u7b49\u7ea7']==='\u4e09\u7ea7'||r['\u7ec8\u7aef\u7b49\u7ea7']==='\u4e8c\u7ea7')return false}else{if(r['\u7ec8\u7aef\u7b49\u7ea7']!==l)return false}}
    return true;
  });
  allData=sortTerminalData(allData);
  
  // 分页计算
  var total=allData.length;
  var totalPages=Math.ceil(total/pageSize)||1;
  if(terminalPage>totalPages)terminalPage=totalPages;
  if(terminalPage<1)terminalPage=1;

  renderPagination('terminalPagination',totalPages,terminalPage,'switchTerminalPage');

  var html='';
  pageData.forEach(function(r,idx){
    var lc=r['\u7ec8\u7aef\u7b49\u7ea7']==='\u4e09\u7ea7'?'badge-3':r['\u7ec8\u7aef\u7b49\u7ea7']==='\u4e8c\u7ea7'?'badge-2':'badge-0';
    var rate=r['\u76ee\u6807\u91d1\u989d']>0?r['\u5b8c\u6210\u91d1\u989d']/r['\u76ee\u6807\u91d1\u989d']:0;
    var rc=rate>=1?'#2E7D32':rate>=0.5?'#E65100':'#C62828';
    var st=rate>=1?'':'<span class="kpi-tag bad" style="margin-left:4px;">\u5f85\u63d0\u5347</span>';
    var seqNum=start+idx+1; var feeRate=r['费用率']||0;html+='<tr><td>'+seqNum+'</td><td><button class="link-btn" onclick="showTerminalDetail(\''+r['\u7ec8\u7aef\u540d\u79f0'].replace(/\'/g,"\\'")+'\')">'+r['\u7ec8\u7aef\u540d\u79f0']+'</button></td><td><span class="badge '+lc+'">'+(r['\u7ec8\u7aef\u7b49\u7ea7']||'\u5176\u4ed6')+'</span></td><td>'+fmtNum(r['\u5b8c\u6210\u91d1\u989d']/10000)+'</td><td>'+(r['\u57ce\u5e02\u7ecf\u7406']||'-')+'</td><td><button class="link-btn" onclick="showTerminalProducts(\''+r['\u7ec8\u7aef\u540d\u79f0'].replace(/\'/g,"\\'")+'\')">'+r['\u5728\u9500\u4ea7\u54c1\u6570']+'</button></td><td>'+fmtNum(r['\u76ee\u6807\u91d1\u989d']/10000)+'</td><td>'+fmtNum(r['\u5b8c\u6210\u91d1\u989d']/10000)+'</td><td><span class="rate-bar"><span class="rate-track"><span class="rate-fill" style="width:'+Math.min(rate*100,100)+'%;background:'+rc+';"></span></span><span style="color:'+rc+';font-size:11px;">'+(rate*100).toFixed(1)+'%</span></span>'+st+'</td><td>'+(feeRate*100).toFixed(1)+'%</td></tr>';
  });

function sortProductData(data){

    }
    return productSortAsc?va-vb:vb-va;
  });

function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='terminal')renderTerminalTable();else renderProductTable();
}

function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modalOverlay').classList.remove('open');}

function render(){var d=calcData[currentArea];renderKPI(d);renderLevelChart(d);renderRings(d);renderTerminalTable();renderProductTable();}

// 分页渲染函数
function renderPagination(elId,totalPages,currentPage,pageFunc){
  var html='<span class="page-info">第 '+currentPage+'/'+totalPages+' 页</span>';
  html+='<button class="page-btn" '+(currentPage<=1?'disabled':'')+' onclick="'+pageFunc+'('+(currentPage-1)+')">上一页</button>';
  var maxPages=5;
  var startPage=Math.max(1,currentPage-Math.floor(maxPages/2));
  var endPage=Math.min(totalPages,startPage+maxPages-1);
  if(endPage-startPage<maxPages-1)startPage=Math.max(1,endPage-maxPages+1);
  for(var i=startPage;i<=endPage;i++){
    html+='<button class="page-btn '+(i===currentPage?'active':'')+'" onclick="'+pageFunc+'('+i+')">'+i+'</button>';
  }
  html+='<button class="page-btn" '+(currentPage>=totalPages?'disabled':'')+' onclick="'+pageFunc+'('+(currentPage+1)+')">下一页</button>';
  html+='<span class="page-jump">跳转<input type="number" class="page-input" min="1" max="'+totalPages+'" value="'+currentPage+'" onchange="var p=parseInt(this.value);if(p>=1&&p<='+totalPages+'){'+pageFunc+'(p)}"></span>';
  document.getElementById(elId).innerHTML=html;
}

function switchTerminalPage(p){terminalPage=p;renderTerminalTable();}
function switchProductPage(p){productPage=p;renderProductTable();}

document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('#terminalTable th[data-sort]').forEach(function(th){
    th.addEventListener('click',function(){
      var f=th.getAttribute('data-sort');
      if(terminalSortField===f){terminalSortAsc=!terminalSortAsc}else{terminalSortField=f;terminalSortAsc=true}
      document.querySelectorAll('#terminalTable th').forEach(function(h){h.classList.remove('sorted')});
      th.classList.add('sorted');
      renderTerminalTable();
    });
  });
  document.querySelectorAll('#productTable th[data-sort]').forEach(function(th){
    th.addEventListener('click',function(){
      var f=th.getAttribute('data-sort');
      if(productSortField===f){productSortAsc=!productSortAsc}else{productSortField=f;productSortAsc=true}
      document.querySelectorAll('#productTable th').forEach(function(h){h.classList.remove('sorted')});
      th.classList.add('sorted');
      renderProductTable();
    });
  });
  render();
});
