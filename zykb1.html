<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>广东——粤东1公司市场看板</title>
<style>
/* ===== 基础重置 ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#dceeff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#1a2a3a;min-height:100vh;font-size:14px}
/* ===== 顶部 ===== */
.top-header{background:linear-gradient(135deg,#1565c0,#1976d2,#0d47a1);padding:12px 16px;text-align:center;box-shadow:0 2px 8px rgba(21,101,192,.4)}
.top-title{color:#fff;font-size:clamp(15px,4vw,22px);font-weight:700;letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.top-sub{color:#bbdefb;font-size:12px;margin-top:3px}
/* ===== 城市切片 ===== */
.tab-bar{display:flex;background:#1565c0;padding:0 8px 8px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:70px;padding:8px 4px;border:none;border-radius:8px;font-size:clamp(12px,3.5vw,14px);font-weight:600;cursor:pointer;transition:all .25s;white-space:nowrap;background:rgba(255,255,255,.15);color:#e3f2fd}
.tab-btn.active{background:#fff;color:#1565c0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
/* ===== 主内容 ===== */
.main-content{padding:10px;max-width:1200px;margin:0 auto}
/* ===== 区块卡片 ===== */
.section{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(21,101,192,.12)}
.section-title{font-size:clamp(13px,3.5vw,15px);font-weight:700;color:#1565c0;border-left:4px solid #1976d2;padding-left:8px;margin-bottom:10px}
/* ===== KPI卡片 ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-card{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:10px;padding:10px;text-align:center;border:1px solid #90caf9}
.kpi-card-title{font-size:11px;color:#1565c0;font-weight:600;margin-bottom:6px}
.kpi-main{font-size:clamp(16px,4vw,22px);font-weight:700;color:#0d47a1;line-height:1.2}
.kpi-sub{display:flex;justify-content:space-between;margin-top:6px;gap:4px;flex-wrap:wrap}
.kpi-sub-item{flex:1;text-align:center;min-width:60px}
.kpi-sub-label{font-size:10px;color:#5c6bc0}
.kpi-sub-val{font-size:12px;font-weight:700;color:#283593}
.kpi-rate{display:inline-block;padding:2px 6px;border-radius:10px;font-size:11px;font-weight:700;margin-top:4px}
.rate-good{background:#e8f5e9;color:#2e7d32}
.rate-mid{background:#fff3e0;color:#e65100}
.rate-low{background:#fce4ec;color:#c62828}
/* ===== 终端覆盖分析 ===== */
.coverage-bar-list{display:flex;flex-direction:column;gap:14px;padding:4px 0}
.coverage-bar-item{}
.coverage-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.coverage-bar-label{font-size:13px;font-weight:700;color:#1565c0;min-width:40px}
.coverage-bar-legend{display:flex;align-items:center;gap:12px;font-size:11px;color:#607d8b}
.coverage-legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}
.coverage-legend-target{background:#bbdefb}
.coverage-legend-active{background:#1565c0}
.coverage-bar-pair{display:flex;flex-direction:column;gap:4px}
.coverage-bar-row{display:flex;align-items:center;gap:6px}
.coverage-bar-row-label{font-size:11px;color:#607d8b;min-width:52px;text-align:right;flex-shrink:0}
.coverage-bar-track{border-radius:6px;height:22px;overflow:hidden;position:relative;flex:1;background:#e8f4fd}
.coverage-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;min-width:0;transition:width .6s ease;padding-right:6px}
.coverage-bar-fill-target{background:#bbdefb}
.coverage-bar-fill-active{background:linear-gradient(90deg,#1e88e5,#1565c0)}
.coverage-bar-val{font-size:11px;font-weight:700;white-space:nowrap;padding:0 6px}
.coverage-bar-val-target{color:#1565c0}
.coverage-bar-val-active{color:#1565c0}
.coverage-bar-rate{font-size:12px;font-weight:700;color:#1565c0;margin-left:8px;min-width:48px;text-align:right;flex-shrink:0}
/* ===== 进度分析 ===== */
.doughnut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.doughnut-wrap{text-align:center}
.doughnut-svg{width:100%;max-width:130px;height:auto;display:block;margin:0 auto}
.doughnut-label{font-size:11px;font-weight:600;color:#1565c0;margin-top:2px}
.doughnut-rate{font-size:13px;font-weight:700;color:#0d47a1}
.doughnut-amounts{font-size:10px;color:#607d8b;margin-top:2px;line-height:1.5}
.doughnut-amounts span{display:block}
/* ===== 明细表格 ===== */
.detail-tab-bar{display:flex;gap:6px;margin-bottom:10px}
.detail-tab-btn{padding:6px 14px;border-radius:16px;border:1.5px solid #90caf9;background:#fff;color:#1565c0;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.detail-tab-btn.active{background:#1976d2;color:#fff;border-color:#1976d2}
.search-filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:120px;padding:7px 10px;border:1.5px solid #90caf9;border-radius:8px;font-size:13px;outline:none;color:#1a2a3a}
.search-input:focus{border-color:#1976d2}
.grade-filter{display:flex;gap:4px;flex-wrap:wrap}
.grade-btn{padding:4px 8px;border-radius:12px;border:1.5px solid #90caf9;background:#fff;color:#1565c0;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.grade-btn.active{background:#1976d2;color:#fff;border-color:#1976d2}
/* 表格容器 */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
thead th{background:#1976d2;color:#fff;padding:8px 6px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid #e3f2fd;transition:background .15s}
tbody tr:hover{background:#e3f2fd}
tbody td{padding:7px 6px;text-align:center;color:#1a2a3a;white-space:nowrap}
tbody tr:nth-child(even){background:#f0f7ff}
tbody tr:nth-child(even):hover{background:#e3f2fd}
.td-link{color:#1976d2;font-weight:700;cursor:pointer;text-decoration:underline}
.td-link:hover{color:#0d47a1}
/* 完成率颜色 */
.rate-cell-good{color:#2e7d32;font-weight:700}
.rate-cell-mid{color:#e65100;font-weight:700}
.rate-cell-low{color:#c62828;font-weight:700}
/* 展开行 */
.drill-row td{padding:0!important}
.drill-content{padding:0 4px 6px 18px;background:#f0f7ff}
.drill-table{width:100%;border-collapse:collapse;font-size:11px}
.drill-table th{background:#bbdefb;color:#1565c0;padding:5px 4px;text-align:center;font-weight:600}
.drill-table td{padding:5px 4px;text-align:center;border-bottom:1px solid #dceeff;color:#1a2a3a}
.drill-table tr:last-child td{border-bottom:none}
.drill-table tr:nth-child(even) td{background:#e3f2fd}
/* 无数据提示 */
.no-data{text-align:center;color:#90a4ae;padding:20px;font-size:13px}
/* 分页 */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.page-btn{padding:4px 10px;border:1.5px solid #90caf9;border-radius:6px;background:#fff;color:#1565c0;font-size:12px;cursor:pointer;transition:all .2s}
.page-btn:hover,.page-btn.active{background:#1976d2;color:#fff;border-color:#1976d2}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:12px;color:#607d8b}
/* 说明文字 */
.footnote{font-size:10px;color:#90a4ae;margin-top:6px;padding-left:4px}
/* ===== 响应式 ===== */
@media(max-width:400px){
  .kpi-main{font-size:15px}
  .kpi-sub-label,.kpi-sub-val{font-size:10px}
  table{font-size:11px}
}
</style>
</head>

<div class="top-header">
  <div class="top-title">广东——粤东1公司市场看板</div>
  <div class="top-sub">数据截至 2026年1-3月 · 城市经理：谢小明</div>
</div>

<div class="tab-bar" id="tabBar">

  <button class="tab-btn" onclick="switchCity('惠州市',this)">惠州市</button>

</div>

<div class="main-content">

  <!-- 第一部分：KPI卡片 -->
  <div class="section">
    <div class="section-title">核心指标</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>

  <!-- 第二部分：终端覆盖分析 -->
  <div class="section">
    <div class="section-title">终端覆盖分析</div>
    <div class="coverage-bar-list" id="coverageBarList"></div>
  </div>

  <!-- 第三部分：销售进度分析 -->
  <div class="section">

    <div class="doughnut-grid" id="doughnutGrid"></div>
  </div>

  <!-- 第四部分：销售明细 -->
  <div class="section">
    <div class="section-title">销售明细</div>
    <div class="detail-tab-bar">
      <button class="detail-tab-btn active" onclick="switchDetail('terminal',this)">终端销售明细</button>
      <button class="detail-tab-btn" onclick="switchDetail('product',this)">产品销售明细</button>
    </div>

    <!-- 终端销售明细 -->
    <div id="terminalDetail">
      <div class="search-filter-row">
        <input class="search-input" type="text" id="hospitalSearch" placeholder="搜索医院名称..." oninput="renderTerminalTable()">
        <div class="grade-filter" id="gradeFilter">
          <button class="grade-btn active" onclick="setGrade('全部',this)">全部</button>
          <button class="grade-btn" onclick="setGrade('三级',this)">三级</button>
          <button class="grade-btn" onclick="setGrade('二级',this)">二级</button>
          <button class="grade-btn" onclick="setGrade('其他',this)">其他</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="terminalTable">
          <thead>
            <tr>
              <th>序号</th>
              <th onclick="sortTable('terminal','name')" style="cursor:pointer">终端名称 ↕</th>
              <th onclick="sortTable('terminal','grade')" style="cursor:pointer">等级 ↕</th>
              <th onclick="sortTable('terminal','drug_scale')" style="cursor:pointer">药品销售规模 ↕</th>
              <th>城市经理</th>
              <th onclick="sortTable('terminal','active_prods')" style="cursor:pointer">在销产品数 ↕</th>
              <th onclick="sortTable('terminal','target')" style="cursor:pointer">目标金额 ↕</th>
              <th onclick="sortTable('terminal','completed')" style="cursor:pointer">当前完成金额 ↕</th>
              <th onclick="sortTable('terminal','rate')" style="cursor:pointer">完成率 ↕</th>
              <th onclick="sortTable('terminal','fee_rate')" style="cursor:pointer">费用率 ↕</th>
            </tr>
          </thead>
          <tbody id="terminalTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="terminalPagination"></div>
      <div class="footnote">药品销售规模 = 年市场规模 × 挂网价/中选价（片/支）；费用率 =（挂网价 × 实际政策）/ 无税发货单价</div>
    </div>

    <!-- 产品销售明细 -->
    <div id="productDetail" style="display:none">
      <div class="search-filter-row">
        <div class="grade-filter" id="prodTypeFilter">
          <button class="grade-btn active" onclick="setProdTypeFilter('全部',this)">全部</button>
          <button class="grade-btn" onclick="setProdTypeFilter('品牌品',this)">品牌品</button>
          <button class="grade-btn" onclick="setProdTypeFilter('高值品',this)">高值品</button>
          <button class="grade-btn" onclick="setProdTypeFilter('商销品',this)">商销品</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="productTable">
          <thead>
            <tr>
              <th>序号</th>
              <th onclick="sortTable('product','name')" style="cursor:pointer">产品名称 ↕</th>
              <th onclick="sortTable('product','type')" style="cursor:pointer">产品分类 ↕</th>
              <th onclick="sortTable('product','active_terminals')" style="cursor:pointer">在销终端数 ↕</th>
              <th onclick="sortTable('product','target')" style="cursor:pointer">目标金额 ↕</th>
              <th onclick="sortTable('product','completed')" style="cursor:pointer">当前完成金额 ↕</th>
              <th onclick="sortTable('product','rate')" style="cursor:pointer">完成率 ↕</th>
              <th onclick="sortTable('product','fee_rate')" style="cursor:pointer">费用率 ↕</th>
            </tr>
          </thead>
          <tbody id="productTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="productPagination"></div>
    </div>
  </div>

</div>

let currentCity = '总体概览';
let currentProdTypeFilter = '全部';
let currentDetailTab = 'terminal';
let currentGrade = '全部';
let terminalSortKey = 'completed';
let terminalSortAsc = false;
let productSortKey = 'completed';
let productSortAsc = false;
let terminalPage = 1;
let productPage = 1;
const PAGE_SIZE = 15;

// ============================================================
// 工具函数
// ============================================================
function fmt(n, decimals=0){
  if(n===null||n===undefined||isNaN(n)) return '-';
  if(Math.abs(n)>=10000) return (n/10000).toFixed(1)+'万';
  return n.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtFull(n){
  if(n===null||n===undefined||isNaN(n)) return '-';
  return n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function rateClass(r){
  if(r===null||r===undefined) return '';
  if(r>=80) return 'rate-cell-good';
  if(r>=40) return 'rate-cell-mid';
  return 'rate-cell-low';
}
function rateSpan(r){
  if(r===null||r===undefined||isNaN(r)) return '-';
  const cls = rateClass(r);
  return `<span class="${cls}">${r.toFixed(1)}%</span>`;
}
function typeColor(t){
  return t==='品牌品'?'#1976d2':t==='高值品'?'#7b1fa2':'#e65100';
}

// ============================================================
// 切换城市
// ============================================================
function switchCity(city, btn){
  currentCity = city;
  terminalPage = 1;
  productPage = 1;
  currentGrade = '全部';
  currentProdTypeFilter = '全部';
  document.getElementById('hospitalSearch').value='';
  // 激活按钮
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // 重置等级筛选
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#gradeFilter .grade-btn')[0].classList.add('active');
  // 重置产品分类筛选
  document.querySelectorAll('#prodTypeFilter .grade-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#prodTypeFilter .grade-btn')[0].classList.add('active');
  renderAll();
}

// ============================================================
// 渲染全部
// ============================================================
function renderAll(){
  const d = DASHBOARD_DATA[currentCity];
  renderKPI(d);
  renderCoverageBars(d);
  renderDoughnuts(d);
  renderTerminalTable();
  renderProductTable();
}

// ============================================================
// 第二部分：终端覆盖分析（横向条形图）
// ============================================================
function renderCoverageBars(d){
  const data = d.coverage_analysis || [];
  const container = document.getElementById('coverageBarList');

  if(!data.length){
    container.innerHTML='<div class="no-data">暂无数据</div>';
    return;
  }

  // 找到最大终端目标数用于条形图宽度比例
  const maxMarket = Math.max(...data.map(g=>g.market_terminals), 1);

  let html = data.map(g=>{
    const pct = g.market_terminals>0 ? (g.active_terminals/g.market_terminals*100) : 0;
    const targetW = (g.market_terminals/maxMarket*100).toFixed(1);
    const activeW = (g.active_terminals/maxMarket*100).toFixed(1);
    const rc = rateClass(pct);
    return `<div class="coverage-bar-item">
      <div class="coverage-bar-header">
        <span class="coverage-bar-label">${g.grade}</span>
        <div class="coverage-bar-legend">
          <span><span class="coverage-legend-dot coverage-legend-target"></span>终端目标</span>
          <span><span class="coverage-legend-dot coverage-legend-active"></span>在销终端</span>
        </div>
      </div>
      <div class="coverage-bar-pair">
        <div class="coverage-bar-row">
          <span class="coverage-bar-row-label">终端目标</span>
          <div class="coverage-bar-track">
            <div class="coverage-bar-fill coverage-bar-fill-target" style="width:${targetW}%">
              ${g.market_terminals/maxMarket>0.35 ? '' : ''}
            </div>
          </div>
          <span class="coverage-bar-val coverage-bar-val-target">${g.market_terminals}</span>
        </div>
        <div class="coverage-bar-row">
          <span class="coverage-bar-row-label">在销终端</span>
          <div class="coverage-bar-track">
            <div class="coverage-bar-fill coverage-bar-fill-active" style="width:${activeW}%">
              ${g.active_terminals/maxMarket>0.35 ? '' : ''}
            </div>
          </div>
          <span class="coverage-bar-val coverage-bar-val-active">${g.active_terminals}</span>
        </div>
      </div>
      <div style="text-align:right;margin-top:3px">
        <span class="coverage-bar-rate">覆盖率 <span class="${rc}">${pct.toFixed(1)}%</span></span>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
}

// ============================================================
// 第三部分：环形图
// ============================================================
function renderDoughnuts(d){
  const types = ['品牌品','高值品','商销品'];
  const colors = ['#1976d2','#7b1fa2','#e65100'];
  const container = document.getElementById('doughnutGrid');
  
  const html = types.map((t,i)=>{
    const td = d.type_data.find(x=>x.type===t);
    const pct = td ? Math.min(100, td.progress_2026||0) : 0;
    const color = colors[i];
    // SVG环形图: 周长=2*PI*r, r=45, C=282.74
    const r = 45, C = 2 * Math.PI * r;
    const offset = C * (1 - pct / 100);
    const pctText = pct.toFixed(1);
    const targetText = td ? fmt(td.target_2026) : '-';
    const completedText = td ? fmt(td.amt_2026) : '-';
    return `<div class="doughnut-wrap">
      <svg class="doughnut-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="#e3f2fd" stroke-width="12"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="12"
          stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
          stroke-linecap="round" transform="rotate(-90 50 50)"
          style="transition:stroke-dashoffset 0.8s ease"/>
        <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
          fill="${color}" font-size="16" font-weight="bold">${pctText}%</text>
      </svg>
      <div class="doughnut-label">${t}</div>
      <div class="doughnut-amounts"><span>目标: ${targetText}</span><span>完成: ${completedText}</span></div>
    </div>`;
  }).join('');
  container.innerHTML = html;
}

// 第四部分：切换明细

function switchDetail(tab, btn){
  currentDetailTab = tab;
  document.querySelectorAll('.detail-tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('terminalDetail').style.display = tab==='terminal'?'block':'none';

// ============================================================
// 等级筛选
// ============================================================
function setGrade(grade, btn){
  currentGrade = grade;
  terminalPage = 1;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTerminalTable();
}

// ============================================================
// 产品分类筛选（产品销售明细）
// ============================================================
function setProdTypeFilter(type, btn){
  currentProdTypeFilter = type;
  document.querySelectorAll('#prodTypeFilter .grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  productPage = 1;
  renderProductTable();

// ============================================================
// 排序
// ============================================================
function sortTable(type, key){
  if(type==='terminal'){
    if(terminalSortKey===key) terminalSortAsc=!terminalSortAsc; else{ terminalSortKey=key; terminalSortAsc=false; }
    terminalPage=1;
    renderTerminalTable();
  } else {
    if(productSortKey===key) productSortAsc=!productSortAsc; else{ productSortKey=key; productSortAsc=false; }
    productPage=1;
    renderProductTable();
  }
}

// ============================================================
// 终端销售明细
// ============================================================
let openTerminals = new Set();
function renderTerminalTable(){
  const d = DASHBOARD_DATA[currentCity];
  const search = (document.getElementById('hospitalSearch').value||'').toLowerCase().trim();
  let rows = d.terminal_data.filter(t=>{
    if(currentGrade!=='全部' && t.grade!==currentGrade) return false;
    if(search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  });
  // 排序
  rows = rows.sort((a,b)=>{
    let va=a[terminalSortKey], vb=b[terminalSortKey];
    if(typeof va==='string') return terminalSortAsc?va.localeCompare(vb,undefined,{numeric:true}):vb.localeCompare(va,undefined,{numeric:true});
    va=va||0; vb=vb||0;
    return terminalSortAsc?va-vb:vb-va;
  });
  
  const total=rows.length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  if(terminalPage>totalPages) terminalPage=1;
  const slice = rows.slice((terminalPage-1)*PAGE_SIZE, terminalPage*PAGE_SIZE);
  
  const tbody = document.getElementById('terminalTbody');
  if(!slice.length){ tbody.innerHTML='<tr><td colspan="10" class="no-data">暂无数据</td></tr>'; renderPagination('terminal',totalPages,total); return; }
  
  const html = slice.map((t,i)=>{
    const idx = (terminalPage-1)*PAGE_SIZE+i+1;
    const rateCls = rateClass(t.rate);
    const feeCls = t.fee_rate>50?'rate-cell-low':t.fee_rate>30?'rate-cell-mid':'rate-cell-good';
    const termKey = `${currentCity}_${t.name}`;
    const isOpen = openTerminals.has(termKey);
    
    // 找该终端的产品明细
    const prodRows = d.terminal_prod_data.filter(r=>r.terminal===t.name);
    const drillHtml = prodRows.length ? prodRows.map(r=>{
      const rc=rateClass(r.rate);
      return `<tr>
        <td>${r.product}</td>
        <td>${r.grade||'-'}</td>
        <td>${r.target_qty>0?fmtFull(r.target_qty):'-'}</td>
        <td>${r.completed_qty>0?fmtFull(r.completed_qty):'-'}</td>
        <td><span class="${rc}">${r.rate>0?r.rate.toFixed(1)+'%':'-'}</span></td>
        <td>${r.client||'-'}</td>
        <td>${r.fee_rate>0?r.fee_rate.toFixed(1)+'%':'-'}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="7" style="text-align:center;color:#90a4ae">暂无产品销售数据</td></tr>';
    
    const drillRow = isOpen ? `<tr class="drill-row" id="drill_${idx}"><td colspan="10">
      <div class="drill-content">
        <table class="drill-table">
          <thead><tr><th>产品名称</th><th>等级</th><th>目标量</th><th>完成量</th><th>完成率</th><th>客户</th><th>费用率</th></tr></thead>
          <tbody>${drillHtml}</tbody>
        </table>
      </div>
    </td></tr>` : '';
    
    return `<tr onclick="toggleDrill('${termKey}',${idx})" style="cursor:pointer">
      <td>${idx}</td>
      <td style="text-align:left;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${t.name}">${t.name}</td>
      <td>${t.grade||'-'}</td>
      <td>${t.drug_scale>0?fmt(t.drug_scale):'-'}</td>
      <td>${t.city_mgr||'-'}</td>
      <td class="td-link" onclick="event.stopPropagation();toggleDrill('${termKey}',${idx})">${t.active_prods}</td>
      <td>${fmtFull(t.target)}</td>
      <td>${fmtFull(t.completed)}</td>
      <td><span class="${rateCls}">${t.rate.toFixed(1)}%</span></td>
      <td><span class="${feeCls}">${t.fee_rate>0?t.fee_rate.toFixed(1)+'%':'-'}</span></td>
    </tr>${drillRow}`;
  }).join('');
  
  tbody.innerHTML = html;
  renderPagination('terminal',totalPages,total);
}

function toggleDrill(key, idx){
  if(openTerminals.has(key)) openTerminals.delete(key);
  else openTerminals.add(key);
  renderTerminalTable();
}

// ============================================================
// 产品销售明细
// ============================================================
let openProducts = new Set();
function renderProductTable(){
  const d = DASHBOARD_DATA[currentCity];
  let rows = [...d.product_detail];
  // 产品分类筛选
  if(currentProdTypeFilter!=='全部') rows = rows.filter(r=>r.type===currentProdTypeFilter);
  rows = rows.sort((a,b)=>{
    let va=a[productSortKey], vb=b[productSortKey];
    if(typeof va==='string') return productSortAsc?va.localeCompare(vb,undefined,{numeric:true}):vb.localeCompare(va,undefined,{numeric:true});
    va=va||0; vb=vb||0;
    return productSortAsc?va-vb:vb-va;
  });
  
  const total=rows.length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  if(productPage>totalPages) productPage=1;
  const slice = rows.slice((productPage-1)*PAGE_SIZE, productPage*PAGE_SIZE);
  
  const tbody = document.getElementById('productTbody');
  if(!slice.length){ tbody.innerHTML='<tr><td colspan="8" class="no-data">暂无数据</td></tr>'; renderPagination('product',totalPages,total); return; }
  
  const html = slice.map((p,i)=>{
    const idx = (productPage-1)*PAGE_SIZE+i+1;
    const rateCls = rateClass(p.rate);
    const feeCls = p.fee_rate>50?'rate-cell-low':p.fee_rate>30?'rate-cell-mid':'rate-cell-good';
    const color = typeColor(p.type);
    const prodKey = `${currentCity}_${p.name}`;
    const isOpen = openProducts.has(prodKey);
    
    // 找该产品的终端明细
    const termRows = d.prod_terminal_data.filter(r=>r.product===p.name);
    const drillHtml = termRows.length ? termRows.map(r=>{
      const rc=rateClass(r.rate);
      return `<tr>
        <td style="text-align:left">${r.terminal}</td>
        <td>${r.grade||'-'}</td>
        <td>${r.target_qty>0?fmtFull(r.target_qty):'-'}</td>
        <td>${r.completed_qty>0?fmtFull(r.completed_qty):'-'}</td>
        <td><span class="${rc}">${r.rate>0?r.rate.toFixed(1)+'%':'-'}</span></td>
        <td>${r.client||'-'}</td>
        <td>${r.fee_rate>0?r.fee_rate.toFixed(1)+'%':'-'}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="7" style="text-align:center;color:#90a4ae">暂无终端数据</td></tr>';
    
    const drillRow = isOpen ? `<tr class="drill-row"><td colspan="8">
      <div class="drill-content">
        <table class="drill-table">
          <thead><tr><th>终端名称</th><th>等级</th><th>目标量</th><th>完成量</th><th>完成率</th><th>客户</th><th>费用率</th></tr></thead>
          <tbody>${drillHtml}</tbody>
        </table>
      </div>
    </td></tr>` : '';
    
    return `<tr style="cursor:pointer" onclick="toggleProdDrill('${prodKey}')">
      <td>${idx}</td>
      <td style="text-align:left;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${p.name}">${p.name}</td>
      <td><span style="color:${color};border:1px solid ${color};border-radius:8px;padding:1px 5px;font-size:11px">${p.type}</span></td>
      <td class="td-link" onclick="event.stopPropagation();toggleProdDrill('${prodKey}')">${p.active_terminals}</td>
      <td>${fmtFull(p.target)}</td>
      <td>${fmtFull(p.completed)}</td>
      <td><span class="${rateCls}">${p.rate.toFixed(1)}%</span></td>
      <td><span class="${feeCls}">${p.fee_rate>0?p.fee_rate.toFixed(1)+'%':'-'}</span></td>
    </tr>${drillRow}`;
  }).join('');
  
  tbody.innerHTML = html;
  renderPagination('product',totalPages,total);
}

function toggleProdDrill(key){
  if(openProducts.has(key)) openProducts.delete(key);
  else openProducts.add(key);
  renderProductTable();
}

// ============================================================
// 分页
// ============================================================
function renderPagination(type, totalPages, total){
  const page = type==='terminal'?terminalPage:productPage;
  const paginationId = type==='terminal'?'terminalPagination':'productPagination';
  const el = document.getElementById(paginationId);
  if(totalPages<=1){ el.innerHTML=''; return; }
  
  const pfx = type==='terminal'?'goTerminalPage':'goProductPage';
  let html = `<button class="page-btn" ${page<=1?'disabled':''} onclick="${pfx}(${page-1})">‹</button>`;
  const start = Math.max(1,page-2), end = Math.min(totalPages,page+2);
  if(start>1) html += `<button class="page-btn" onclick="${pfx}(1)">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for(let p=start;p<=end;p++) html+=`<button class="page-btn${p===page?' active':''}" onclick="${pfx}(${p})">${p}</button>`;
  if(end<totalPages) html+=`${end<totalPages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="${pfx}(${totalPages})">${totalPages}</button>`;
  html+=`<button class="page-btn" ${page>=totalPages?'disabled':''} onclick="${pfx}(${page+1})">›</button>`;
  html+=`<span class="page-info">共${total}条</span>`;
  el.innerHTML=html;
}
function goTerminalPage(p){ terminalPage=p; openTerminals.clear(); renderTerminalTable(); }
function goProductPage(p){ productPage=p; openProducts.clear(); renderProductTable(); }

// ============================================================
// 初始化
// ============================================================
window.addEventListener('DOMContentLoaded', ()=>{
  try {
    renderAll();
  } catch(e) {
    document.body.innerHTML = '<div style="padding:20px;color:red;font-size:16px"><b>JS Error:</b> '+e.message+'<br><pre>'+e.stack+'</pre></div>';
  }
});
</script>
