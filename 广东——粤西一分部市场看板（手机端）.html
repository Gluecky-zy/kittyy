<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>广东——粤西一分部市场看板（手机端）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: rgb(23, 110, 201);
            --primary-dark: rgb(15, 75, 145);
            --primary-light: rgb(100, 160, 230);
            --primary-lighter: rgb(180, 210, 240);
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333;
            --text-light: #666;
            --border-color: #e0e6ed;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container { max-width: 100%; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 16px; font-weight: 600; }
        .header .date { font-size: 11px; opacity: 0.9; }
        
        .filter-section {
            background: var(--card-bg);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        
        .filter-label { font-weight: 600; color: var(--primary); font-size: 12px; margin-bottom: 8px; }
        
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .btn {
            padding: 6px 12px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .btn:hover { background: var(--primary-lighter); }
        .btn.active { background: var(--primary); color: white; }
        
        /* KPI卡片 - 2x2网格 */
        .cards-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--primary);
        }
        
        .card.highlight {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .card.highlight .card-sub { color: rgba(255,255,255,0.8); }
        
        .card-title { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
        .card.highlight .card-title { color: rgba(255,255,255,0.9); }
        
        .card-value { font-size: 18px; font-weight: 700; color: var(--primary); }
        .card.highlight .card-value { color: white; }
        
        .card-sub { font-size: 10px; color: var(--text-light); margin-top: 3px; }
        
        .section {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        
        .section h3 {
            font-size: 13px;
            color: var(--primary-dark);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-light);
        }
        
        /* 环形图 - 三列并排 */
        .chart-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }
        
        .chart-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #fafbfc;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            min-width: 0;
        }
        
        .chart-item h4 { font-size: 11px; color: var(--text); margin-bottom: 6px; }
        
        .chart-item canvas {
            width: 80px !important;
            height: 80px !important;
        }
        
        .bar-section { display: flex; flex-direction: column; gap: 8px; }
        
        .bar-row {
            display: grid;
            grid-template-columns: 40px 1fr 100px;
            align-items: center;
            gap: 8px;
        }
        
        .bar-label { font-weight: 600; color: var(--text); font-size: 11px; }
        
        .bar-track {
            height: 20px;
            background: #e8eef4;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--primary-dark) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding-left: 6px;
            color: white;
            font-size: 9px;
            font-weight: 600;
            min-width: fit-content;
        }
        
        .bar-value { font-size: 9px; color: var(--text-light); text-align: right; }
        .bar-value strong { color: var(--primary-dark); }
        
        /* 表格横向滚动 */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            min-width: 600px;
        }
        
        th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 8px 6px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }
        
        td {
            padding: 8px 6px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        
        tr:hover { background: #f5f9ff; }
        
        .clickable {
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }
        
        /* 名称截断 - 默认显示10个字 */
        .text-ellipsis {
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
        }
        
        .progress-bar {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        
        .progress-track {
            width: 40px;
            height: 8px;
            background: #e8eef4;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
        }
        
        .progress-text { font-size: 9px; min-width: 28px; }
        
        .progress-high { background: linear-gradient(90deg, #52c41a, #73d13d); }
        .progress-mid { background: linear-gradient(90deg, #faad14, #ffc53d); }
        .progress-low { background: linear-gradient(90deg, #ff4d4f, #ff7875); }
        
        .hidden { display: none; }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .back-btn {
            background: #f0f0f0;
            color: var(--text);
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .back-btn:hover { background: #e0e0e0; }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .tab-btn {
            padding: 6px 12px;
            border: 1px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* 切片器样式 */
        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .filter-label-text { font-weight: 600; color: var(--primary); font-size: 11px; }
        
        .filter-btn {
            padding: 4px 10px;
            border: 1px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .filter-btn:hover { background: var(--primary-lighter); }
        
        .filter-btn.active, .filter-btn.all-active {
            background: var(--primary);
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 10px 0;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text);
        }
        .pagination button:hover:not(:disabled) {
            background: var(--primary-lighter);
            color: var(--primary);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            font-size: 12px;
            color: var(--text-light);
            padding: 0 8px;
        }
        .pagination .page-input {
            width: 40px;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>

                        <th>完成金额</th>
                        <th>费用率</th>

                    <tbody id="productBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="productPagination"></div>
        </div>
        
        <div id="terminalDetailView" class="section hidden">

                        <th>完成率</th>
                        <th>目标量</th>
                        <th>完成量</th>
                        <th>客户</th>
                        <th>费用率</th>
                    </tr></thead>
                    <tbody id="terminalDetailBody"></tbody>
                </table>
            </div>
        </div>
        
        <div id="productDetailView" class="section hidden">
            <div class="detail-header">
                <button class="back-btn" onclick="showProductMain()">返回</button>
                <div id="productDetailTitle" style="font-weight:600;color:var(--primary-dark);font-size:12px;"></div>

        </div>

                <div class="chart-item">
                    <h4>${type} (${progress.toFixed(1)}%)</h4>
                    <canvas id="pie${i+1}"></canvas>
                    <div style="font-size:9px;color:#666;margin-top:4px;">
                        ${formatNum(actual)} / ${formatNum(target)}
                    </div>
                </div>
            `;
        });
        document.getElementById('pieCharts').innerHTML = html;
        
        order.forEach((type, i) => {
            const t = ts[type];
            const target = t?.target_2026 || 0;
            const actual = t?.sales_2026 || 0;
            const remaining = Math.max(0, target - actual);
            
            const ctx = document.getElementById('pie' + (i+1));
            if (!ctx) return;
            
            pieCharts.push(new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['已完成', '未完成'],
                    datasets: [{
                        data: [actual, remaining],
                        backgroundColor: colors[i],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: false,
                    width: 90,
                    height: 90,
                    cutout: '60%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    }
                }
            }));
        });
    }
    
    function loadBarCharts() {
        const ls = dashboardData[currentCity].level_summary;
        const container = document.getElementById('barCharts');
        
        container.innerHTML = ['三级', '二级', '其他'].map(level => {
            const d = ls[level] || {target_terminals: 0, selling_terminals: 0};
            const target = d.target_terminals;
            const selling = d.selling_terminals;
            const maxVal = Math.max(target, selling, 1);
            const sellingWidth = (selling / maxVal * 100).toFixed(1);
            const coverage = target > 0 ? ((selling / target) * 100).toFixed(1) : '0.0';
            
            return '<div class="bar-row"><div class="bar-label">' + level + '</div><div class="bar-track"><div class="bar-fill" style="width:' + sellingWidth + '%">' + selling + '</div></div><div class="bar-value"><strong>' + selling + '</strong>/' + target + ' ' + coverage + '%</div></div>';
        }).join('');
    }
    
    // 终端等级筛选处理
    function handleTerminalLevelFilter(filter) {
        terminalState.page = 1;
        if (filter === 'all') {
            terminalState.filterAll = true;
            terminalState.filterLevels = [];
        } else {
            terminalState.filterAll = false;
            const idx = terminalState.filterLevels.indexOf(filter);
            if (idx > -1) {
                terminalState.filterLevels.splice(idx, 1);
            } else {
                terminalState.filterLevels.push(filter);
            }
            if (terminalState.filterLevels.length === 0) {
                terminalState.filterAll = true;
            }
        }
        updateTerminalFilterUI();
        loadTerminalTable();
    }
    
    function updateTerminalFilterUI() {
        document.querySelectorAll('#terminalLevelFilter .filter-btn').forEach(b => {
            b.classList.remove('active', 'all-active');
            if (b.dataset.filter === 'all') {
                if (terminalState.filterAll) b.classList.add('all-active');
            } else if (terminalState.filterLevels.includes(b.dataset.filter)) {
                b.classList.add('active');
            }
        });
    }
    
    function loadTerminalTable() {
        let terminals = [...dashboardData[currentCity].terminals];
        
        // 等级筛选
        if (!terminalState.filterAll && terminalState.filterLevels.length > 0) {
            terminals = terminals.filter(t => terminalState.filterLevels.includes(t.level));
        }
        
        const total = terminals.length;
        const totalPages = Math.max(1, Math.ceil(total / terminalState.pageSize));
        if (terminalState.page > totalPages) terminalState.page = totalPages;
        if (terminalState.page < 1) terminalState.page = 1;
        
        const start = (terminalState.page - 1) * terminalState.pageSize;
        const end = start + terminalState.pageSize;
        const paged = terminals.slice(start, end);
        
        document.getElementById('terminalBody').innerHTML = paged.map(t => {
            const manager = t.manager || '-';
            const nameDisplay = '<span class="text-ellipsis" title="' + t.name + '">' + truncateText(t.name, 10) + '</span>';
            return '<tr><td class="clickable" onclick="showTerminalDetail(\'' + t.name.replace(/'/g, "\'") + '\')">' + nameDisplay + '</td><td>' + (t.level || '-') + '</td><td>' + manager + '</td><td><strong style="color:var(--primary)">' + formatNum(t.sales) + '</strong></td><td>' + formatNum(t.target) + '</td><td>' + getRateBarHtml(t.rate) + '</td><td>' + t.products + '</td></tr>';
        }).join('');
        
        renderPagination('terminalPagination', terminalState.page, totalPages, total);
    }
    
    // 产品分类筛选处理
    function handleProductCategoryFilter(filter) {
        productState.page = 1;
        if (filter === 'all') {
            productState.filterAll = true;
            productState.filterCategories = [];
        } else {
            productState.filterAll = false;
            const idx = productState.filterCategories.indexOf(filter);
            if (idx > -1) {
                productState.filterCategories.splice(idx, 1);
            } else {
                productState.filterCategories.push(filter);
            }
            if (productState.filterCategories.length === 0) {
                productState.filterAll = true;
            }
        }
        updateProductFilterUI();
        loadProductTable();
    }
    
    function updateProductFilterUI() {
        document.querySelectorAll('#productCategoryFilter .filter-btn').forEach(b => {
            b.classList.remove('active', 'all-active');
            if (b.dataset.filter === 'all') {
                if (productState.filterAll) b.classList.add('all-active');
            } else if (productState.filterCategories.includes(b.dataset.filter)) {
                b.classList.add('active');
            }
        });
    }
    
    function loadProductTable() {
        let products = [...dashboardData[currentCity].products];
        
        // 分类筛选
        if (!productState.filterAll && productState.filterCategories.length > 0) {
            products = products.filter(p => productState.filterCategories.includes(p.category));
        }
        
        const total = products.length;
        const totalPages = Math.max(1, Math.ceil(total / productState.pageSize));
        if (productState.page > totalPages) productState.page = totalPages;
        if (productState.page < 1) productState.page = 1;
        
        const start = (productState.page - 1) * productState.pageSize;
        const end = start + productState.pageSize;
        const paged = products.slice(start, end);
        
        document.getElementById('productBody').innerHTML = paged.map(p => {
            const nameDisplay = '<span class="text-ellipsis" title="' + p.name + '">' + truncateText(p.name, 10) + '</span>';
            const expenseRate = p.expense_rate ? p.expense_rate.toFixed(1) + '%' : '-';
            return '<tr><td class="clickable" onclick="showProductDetail(\'' + p.name.replace(/'/g, "\'") + '\')">' + nameDisplay + '</td><td>' + p.terminals + '</td><td>' + formatNum(p.target) + '</td><td><strong style="color:var(--primary)">' + formatNum(p.sales) + '</strong></td><td>' + expenseRate + '</td><td>' + getRateBarHtml(p.rate) + '</td></tr>';
        }).join('');
        
        renderPagination('productPagination', productState.page, totalPages, total);
    }
    
    function showTerminalDetail(name) {
        const data = dashboardData[currentCity].terminal_details[name];
        if (!data || !data.details || data.details.length === 0) {
            alert('暂无该终端的明细数据');
            return;
        }
        
        document.getElementById('terminalDetailTitle').textContent = name + ' (等级:' + data.level + ')';
        document.getElementById('terminalDetailBody').innerHTML = data.details.map(d => {
            const productName = '<span class="text-ellipsis" title="' + d.product + '">' + truncateText(d.product, 10) + '</span>';
            const expenseRate = d.expense_rate ? d.expense_rate.toFixed(1) + '%' : '-';
            return '<tr><td>' + productName + '</td><td>' + formatNum(d.target) + '</td><td><strong style="color:var(--primary)">' + formatNum(d.sales) + '</strong></td><td>' + getRateBarHtml(d.rate) + '</td><td>' + formatNum(d.target_vol) + '</td><td>' + formatNum(d.sales_vol) + '</td><td>' + d.customer + '</td><td>' + expenseRate + '</td></tr>';
        }).join('');
        
        document.getElementById('terminalTable').classList.add('hidden');
        document.getElementById('productTable').classList.add('hidden');
        document.getElementById('terminalDetailView').classList.remove('hidden');
    }
    
    function showTerminalMain() {
        document.getElementById('terminalDetailView').classList.add('hidden');
        document.getElementById('terminalTable').classList.remove('hidden');
    }
    
    function showProductDetail(name) {
        const data = dashboardData[currentCity].product_details[name];
        if (!data || !data.details || data.details.length === 0) {
            alert('暂无该产品的明细数据');
            return;
        }
        
        document.getElementById('productDetailTitle').textContent = name;
        document.getElementById('productDetailBody').innerHTML = data.details.map(d => {
            const terminalName = '<span class="text-ellipsis" title="' + d.terminal + '">' + truncateText(d.terminal, 10) + '</span>';
            const expenseRate = d.expense_rate ? d.expense_rate.toFixed(1) + '%' : '-';
            return '<tr><td class="clickable" onclick="showTerminalDetail(\'' + d.terminal.replace(/'/g, "\'") + '\')">' + terminalName + '</td><td>' + (d.level || '-') + '</td><td>' + formatNum(d.target_vol) + '</td><td><strong style="color:var(--primary)">' + formatNum(d.sales_vol) + '</strong></td><td>' + formatNum(d.sales_2025) + '</td><td>' + getRateBarHtml(d.rate) + '</td><td>' + d.customer + '</td><td>' + expenseRate + '</td></tr>';
        }).join('');
        
        document.getElementById('productTable').classList.add('hidden');
        document.getElementById('productDetailView').classList.remove('hidden');
    }
    
    function showProductMain() {
        document.getElementById('productDetailView').classList.add('hidden');
        document.getElementById('productTable').classList.remove('hidden');
    }
    
    function refreshAll() {
        terminalState = { filterAll: true, filterLevels: [], page: 1, pageSize: 10 };
        productState = { filterAll: true, filterCategories: [], page: 1, pageSize: 10 };
        loadCards();
        loadPieCharts();
        loadBarCharts();
        loadTerminalTable();
        loadProductTable();
        updateTerminalFilterUI();
        updateProductFilterUI();
        showTerminalMain();
        showProductMain();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('#cityBtns .btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#cityBtns .btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCity = btn.dataset.city;
                refreshAll();
            });
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.getElementById('terminalTable').classList.toggle('hidden', tab !== 'terminal');
                document.getElementById('productTable').classList.toggle('hidden', tab !== 'product');
            });
        });
        
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {year: 'numeric', month: 'long', day: 'numeric'});
        refreshAll();
    });
    </script>
</body>
</html>
