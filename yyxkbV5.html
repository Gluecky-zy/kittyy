            }
        }

        function filterData(data, keyword) {
            // 先应用等级和分类筛选
            data = data.filter(item => {
                if (currentTable === 'terminal') {
                    return currentLevel === '全部' || item['终端等级'] === currentLevel;
                } else {
                    return currentCategory === '全部' || item['产品分类'] === currentCategory;
                }

            if (!keyword) return data;
            keyword = keyword.toLowerCase();
            if (currentTable === 'terminal') {
                return data.filter(item =>

                    (item['负责人'] || '').toLowerCase().includes(keyword)
                );
            } else {
                return data.filter(item =>

                    (item['产品分类'] || '').toLowerCase().includes(keyword)
                );
            }
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / pageSize);
            const pagination = document.getElementById('pagination');
            let html = '';
            
            html += `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<span style="padding:0 5px;color:#999;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span style="padding:0 5px;color:#999;">...</span>`;
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
            html += `<span class="page-info">共 ${totalItems} 条，第 ${currentPage}/${totalPages} 页</span>`;

                series: [
                    { name: '目标终端', type: 'bar', data: data.map(d => d.target), itemStyle: { color: '#90caf9', borderRadius: [0, 4, 4, 0] }, barWidth: '40%' },
                    { name: '在销终端', type: 'bar', data: data.map(d => d.selling), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#0d47a1' }, { offset: 1, color: '#1976d2' }]), borderRadius: [0, 4, 4, 0] }, barWidth: '40%' }
                ]
            });
        }

        function renderCategoryChart() {
            const data = dashboardData[currentCity].summary.category_stats;
            const colors = ['#0d47a1', '#1976d2', '#90caf9'];
            
            for (let i = 0; i < 3; i++) {
                const catData = data[i];
                if (!catData) continue;
                
                const chart = echarts.init(document.getElementById('categoryChart' + (i + 1)));
                const rate = catData.target > 0 ? ((catData.current / catData.target) * 100).toFixed(1) : 0;
                
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: function(p) { return '<strong>' + catData.category + '</strong><br/>目标: ' + catData.target.toFixed(2) + '万<br/>完成: ' + catData.current.toFixed(2) + '万<br/>完成率: ' + rate + '%'; } },
                    series: [{ 
                        type: 'pie', 
                        radius: ['50%', '75%'], 
                        center: ['50%', '50%'],
                        itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 3 },
                        label: { show: false },
                        data: [
                            { value: catData.current, name: '已完成', itemStyle: { color: colors[i] } },
                            { value: Math.max(0, catData.target - catData.current), name: '未完成', itemStyle: { color: '#e0e0e0' } }
                        ]
                    }],
                    graphic: [{ 
                        type: 'text', 
                        left: 'center', 
                        top: '42%', 
                        style: { text: rate + '%', textAlign: 'center', fill: colors[i], fontSize: 18, fontWeight: 'bold' } 
                    }]
                });
                
                document.getElementById('categoryStats' + (i + 1)).innerHTML = 
                    '<div>目标: ' + catData.target.toFixed(2) + '万</div>' +
                    '<div>完成: ' + catData.current.toFixed(2) + '万</div>';
            }
        }
        
        function renderCategoryChartOld() {
            const data = dashboardData[currentCity].summary.category_stats;
            const chart = echarts.init(document.getElementById('categoryChart'));
            const total = data.reduce((sum, d) => sum + d.target, 0);
            const totalCurrent = data.reduce((sum, d) => sum + d.current, 0);
            const overallRate = total > 0 ? ((totalCurrent / total) * 100).toFixed(1) : 0;
            chart.setOption({
                tooltip: { trigger: 'item', formatter: function(p) { const r = p.data.target > 0 ? ((p.data.current / p.data.target) * 100).toFixed(1) : 0; return '<strong>' + p.name + '</strong><br/>目标: ' + p.data.target.toFixed(2) + '万<br/>完成: ' + p.data.current.toFixed(2) + '万<br/>完成率: ' + r + '%'; } },
                legend: { orient: 'vertical', right: '3%', top: 'center', itemWidth: 14, itemHeight: 14 },
                series: [{ type: 'pie', radius: ['45%', '70%'], center: ['35%', '50%'], itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 }, label: { show: true, formatter: '{b}\n{d}%', position: 'outside', fontSize: 12 }, labelLine: { show: true, length: 8, length2: 15 }, data: data.map((d, i) => ({ name: d.category, value: d.target, target: d.target, current: d.current, itemStyle: { color: ['#0d47a1', '#1976d2', '#90caf9'][i] } })) }],
                graphic: [{ type: 'text', left: '28%', top: '44%', style: { text: '总体完成率', textAlign: 'center', fill: '#666', fontSize: 12 } }, { type: 'text', left: '28%', top: '52%', style: { text: overallRate + '%', textAlign: 'center', fill: '#1976d2', fontSize: 22, fontWeight: 'bold' } }]
            });
        }

        function renderTable() {
            const container = document.getElementById('tableContainer');
            const allData = getTableData();
            
            // 初始化filteredData
            if (filteredData.length === 0 || currentTable !== window.lastTable) {
                filteredData = [...allData];
                window.lastTable = currentTable;
            }
            
            const totalItems = filteredData.length;
            const totalPages = Math.ceil(totalItems / pageSize);
            if (currentPage > totalPages) currentPage = 1;
            
            const startIdx = (currentPage - 1) * pageSize;
            const endIdx = Math.min(startIdx + pageSize, totalItems);
            const pageData = filteredData.slice(startIdx, endIdx);
            
            if (currentTable === 'terminal') {
                renderTerminalTable(container, pageData);
            } else {
                renderProductTable(container, pageData);
            }
            
            renderPagination(totalItems);
        }

        function renderTerminalTable(container, data) {
            let html = '<table><thead><tr><th>终端名称</th><th>等级</th><th>药品销售金额(万元)</th><th>负责人</th><th>在销产品数</th><th>销售目标(万元)</th><th>完成金额(万元)</th><th>完成率</th></tr></thead><tbody>';
            data.forEach(item => {
                const rate = item.完成率 || 0;
                const level = item['终端等级'] || '';
                const levelClass = level === '三级' ? 'level-3' : (level === '二级' ? 'level-2' : 'level-other');
                const levelTag = '<span class="level-tag ' + levelClass + '">' + level + '</span>';
                html += '<tr><td>' + escapeHtml(item['终端名称'] || '') + '</td><td>' + levelTag + '</td><td>' + (item['药品销售金额_万'] || 0).toFixed(2) + '</td><td>' + escapeHtml(item['城市经理'] || '') + '</td><td><span class="drill-link" onclick="drillTerminal(\'' + escapeJS(item['终端名称']) + '\')">' + (item['在销产品数'] || 0) + '</span></td><td>' + (item['销售目标金额_万'] || 0).toFixed(2) + '</td><td>' + (item['当前完成金额_万'] || 0).toFixed(2) + '</td><td><div style="display:flex;align-items:center;gap:8px;min-width:100px;"><div class="progress-bar" style="flex:1;"><div class="progress-fill" style="width:' + Math.min(rate, 100) + '%"></div></div><span>' + rate.toFixed(1) + '%</span></div></td></tr>';
            });
            html += '</tbody></table>';
            if (data.length === 0) {
                html = '<div style="text-align:center;padding:40px;color:#999;">暂无数据</div>';
            }
            container.innerHTML = html;
        }

        function renderProductTable(container, data) {
            let html = '<table><thead><tr><th>产品名称</th><th>产品分类</th><th>在销终端数</th><th>销售目标(万元)</th><th>完成金额(万元)</th><th>完成率</th></tr></thead><tbody>';
            data.forEach(item => {
                const rate = item.完成率 || 0;
                const category = item['产品分类'] || '';
                let catClass = 'commercial';
                if (category === '品牌品') catClass = 'brand';
                else if (category === '高值品') catClass = 'high';
                const categoryTag = '<span class="category-tag ' + catClass + '">' + category + '</span>';
                html += '<tr><td>' + escapeHtml(item['产品名称'] || '') + '</td><td>' + categoryTag + '</td><td><span class="drill-link" onclick="drillProduct(\'' + escapeJS(item['产品名称']) + '\')">' + (item['在销终端数'] || 0) + '</span></td><td>' + (item['销售目标金额_万'] || 0).toFixed(2) + '</td><td>' + (item['当前完成金额_万'] || 0).toFixed(2) + '</td><td><div style="display:flex;align-items:center;gap:8px;min-width:100px;"><div class="progress-bar" style="flex:1;"><div class="progress-fill" style="width:' + Math.min(rate, 100) + '%"></div></div><span>' + rate.toFixed(1) + '%</span></div></td></tr>';
            });
            html += '</tbody></table>';
            if (data.length === 0) {
                html = '<div style="text-align:center;padding:40px;color:#999;">暂无数据</div>';
            }
            container.innerHTML = html;
        }

        function drillTerminal(name) {
            const modal = document.getElementById('drillModal');
            document.getElementById('modalTitle').textContent = '终端详情 - ' + name;
            document.getElementById('breadcrumb').innerHTML = '<span onclick="closeModal()">返回看板</span> > 终端: ' + name;
            modal.classList.add('show');
            const dd = dashboardData.drilldown[currentCity]?.terminal_drilldown?.[name];
            if (dd && dd.length > 0) {
                let html = '<table><thead><tr><th>产品名称</th><th>目标金额(万元)</th><th>完成金额(万元)</th><th>完成率</th><th>目标量</th><th>完成量</th><th>客户</th><th>费用率</th></tr></thead><tbody>';
                dd.forEach(item => { html += '<tr><td>' + escapeHtml(item['产品名称'] || '') + '</td><td>' + (item['目标金额_万'] || 0) + '</td><td>' + (item['完成金额_万'] || 0) + '</td><td>' + (item['完成率'] || 0).toFixed(1) + '%</td><td>' + (item['目标量'] || 0) + '</td><td>' + (item['完成量'] || 0) + '</td><td>' + escapeHtml(item['客户'] || '') + '</td><td>' + (item['费用率'] || 0) + '%</td></tr>'; });
                html += '</tbody></table>';
                document.getElementById('modalTable').innerHTML = html;
            } else {
                document.getElementById('modalTable').innerHTML = '<div class="loading">暂无下钻数据</div>';
            }
        }

        function drillProduct(name) {
            const modal = document.getElementById('drillModal');
            document.getElementById('modalTitle').textContent = '产品详情 - ' + name;
            document.getElementById('breadcrumb').innerHTML = '<span onclick="closeModal()">返回看板</span> > 产品: ' + name;
            modal.classList.add('show');
            const dd = dashboardData.drilldown[currentCity]?.product_drilldown?.[name];
            if (dd && dd.length > 0) {
                let html = '<table><thead><tr><th>终端名称</th><th>等级</th><th>目标金额(万元)</th><th>完成金额(万元)</th><th>完成率</th><th>客户</th><th>费用率</th></tr></thead><tbody>';
                dd.forEach(item => { html += '<tr><td>' + escapeHtml(item['终端名称'] || '') + '</td><td>' + (item['等级'] || '') + '</td><td>' + (item['目标金额_万'] || 0) + '</td><td>' + (item['完成金额_万'] || 0) + '</td><td>' + (item['完成率'] || 0).toFixed(1) + '%</td><td>' + escapeHtml(item['客户'] || '') + '</td><td>' + (item['费用率'] || 0) + '%</td></tr>'; });
                html += '</tbody></table>';
                document.getElementById('modalTable').innerHTML = html;
            } else {
                document.getElementById('modalTable').innerHTML = '<div class="loading">暂无下钻数据</div>';
            }
        }

        function closeModal() { document.getElementById('drillModal').classList.remove('show'); }
        function formatNumber(num) { if (num === undefined || num === null || isNaN(num)) return '0'; return num.toLocaleString('zh-CN', {maximumFractionDigits: 2}); }
        function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        function escapeJS(str) { if (!str) return ''; return str.replace(/'/g, "\'").replace(/"/g, '\"'); }

        document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); this.classList.add('active'); currentCity = this.dataset.city; filteredData = []; currentPage = 1; renderDashboard(); }); });
        document.querySelectorAll('.table-tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.table-tab').forEach(t => t.classList.remove('active')); this.classList.add('active'); currentTable = this.dataset.table; filteredData = []; currentPage = 1; var categoryFilter = document.getElementById('categoryFilter'); if (currentTable === 'product') { categoryFilter.classList.add('show'); } else { categoryFilter.classList.remove('show'); } renderTable(); }); });
        
        // 等级筛选按钮
        document.querySelectorAll('#levelFilter .filter-btn').forEach(btn => {
            btn.onclick = function(e) {
                e.stopPropagation();
                document.querySelectorAll('#levelFilter .filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLevel = this.getAttribute('data-level');
                doSearch();
            };
        });
        
        // 产品分类筛选按钮
        document.querySelectorAll('#categoryFilter .filter-btn').forEach(btn => {
            btn.onclick = function(e) {
                e.stopPropagation();
                document.querySelectorAll('#categoryFilter .filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-category');
                doSearch();
            };
        });
        
        document.getElementById('drillModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        // 显示实时日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }
        updateDate();
        setInterval(updateDate, 60000);
        
        renderDashboard();
    </script>
</body>
</html>
